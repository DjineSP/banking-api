/banks:
  get:
    tags: [Banks]
    summary: Lister les banques actives [ADMIN, CLIENT]
    security:
      - bearerAuth: []
    responses:
      '200':
        description: Liste des banques
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  type: array
                  items:
                    $ref: '#/components/schemas/Bank'

  post:
    tags: [Banks]
    summary: Créer une banque [ADMIN]
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [code, name, min_amount, max_amount, internal_fee_tx, interbank_fee_tx, withdraw_fee]
            properties:
              code:
                type: string
                example: SG
              name:
                type: string
                example: Société Générale
              min_amount:
                type: number
                example: 500
              max_amount:
                type: number
                example: 5000000
              internal_fee_tx:
                type: number
                example: 0.005
              interbank_fee_tx:
                type: number
                example: 0.01
              withdraw_fee:
                type: number
                example: 0.008
    responses:
      '201':
        description: Banque créée
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Success'
      '409':
        description: Code banque déjà utilisé
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'

/banks/{id}:
  get:
    tags: [Banks]
    summary: Détail d'une banque [ADMIN, CLIENT]
    security:
      - bearerAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '200':
        description: Banque retournée
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Success'
      '404':
        description: Banque introuvable
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'

  patch:
    tags: [Banks]
    summary: Modifier une banque [ADMIN]
    security:
      - bearerAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    requestBody:
      content:
        application/json:
          schema:
            type: object
            properties:
              name:
                type: string
              min_amount:
                type: number
              max_amount:
                type: number
              internal_fee_tx:
                type: number
              interbank_fee_tx:
                type: number
              withdraw_fee:
                type: number
    responses:
      '200':
        description: Banque modifiée
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Success'
      '404':
        description: Banque introuvable
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'

/banks/{id}/toggle:
  patch:
    tags: [Banks]
    summary: Activer / désactiver une banque [ADMIN]
    security:
      - bearerAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '200':
        description: Statut modifié
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Success'
      '404':
        description: Banque introuvable
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
