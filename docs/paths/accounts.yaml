/accounts:
  post:
    tags: [Accounts]
    summary: Ouvrir un compte [ADMIN, CLIENT]
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [bank_id]
            properties:
              bank_id:
                type: string
                format: uuid
              currency:
                type: string
                enum: [XAF, USD, EUR]
                default: XAF
              user_id:
                type: string
                format: uuid
                description: Réservé à l'ADMIN
    responses:
      '201':
        description: Compte créé
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Success'
      '404':
        description: Banque introuvable ou inactive
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'

  get:
    tags: [Accounts]
    summary: Lister tous les comptes [ADMIN]
    security:
      - bearerAuth: []
    responses:
      '200':
        description: Liste des comptes
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  type: array
                  items:
                    $ref: '#/components/schemas/Account'
      '403':
        description: Accès refusé
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'

/accounts/mine:
  get:
    tags: [Accounts]
    summary: Mes comptes [CLIENT]
    security:
      - bearerAuth: []
    responses:
      '200':
        description: Liste de mes comptes
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  type: array
                  items:
                    $ref: '#/components/schemas/Account'

/accounts/{id}:
  get:
    tags: [Accounts]
    summary: Détail d'un compte [ADMIN, CLIENT]
    security:
      - bearerAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '200':
        description: Compte retourné
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Success'
      '404':
        description: Compte introuvable
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'

/accounts/{id}/transactions:
  get:
    tags: [Accounts]
    summary: Historique des transactions d'un compte [ADMIN, CLIENT]
    security:
      - bearerAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '200':
        description: Liste des transactions
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  type: array
                  items:
                    $ref: '#/components/schemas/Transaction'
      '404':
        description: Compte introuvable
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'

/accounts/{id}/close:
  patch:
    tags: [Accounts]
    summary: Fermer un compte [ADMIN, CLIENT]
    security:
      - bearerAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '204':
        description: Compte fermé
      '422':
        description: Solde positif — impossible de fermer
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
